# IGS MCP Server — Settings Configuration (Example)
# Copy this file to ~/.config/igs-mcp/settings.yml and customize.
# Environment variable substitution: ${VAR_NAME} is replaced at runtime.

# ─── HTTP Client ──────────────────────────────────────────────
http:
  userAgent: IGS/0.5.2 (+https://github.com/ishan-parihar/igs-rust-mcp)
  timeoutMs: 15000
  retries: 2
  backoffBaseMs: 500
  backoffFactor: 2.0
  concurrency: 6
  perHost: 2

# ─── Caching ──────────────────────────────────────────────────
cache:
  enabled: true
  dir: cache
  ttlMs: 1800000
  # Removed (YAGNI): honorEtags, queryTtlMs, maxItemsPerSource
  # These fields are still accepted in settings.yml for backward compat
  # but are no longer read by any code path.

# ─── Web Search Providers ─────────────────────────────────────

# Tavily — AI-powered web search
# Get API key: https://tavily.com
tavily:
  enabled: true
  apiKey: ${TAVILY_API_KEY}
  searchDepth: basic
  defaultTopic: general
  timeoutMs: 30000

# Firecrawl — Web scraping and crawling API
# Get API key: https://firecrawl.dev
firecrawl:
  enabled: true
  apiKey: ${FIRECRAWL_API_KEY}
  timeoutMs: 60000
  defaultFormats:
    - markdown
    - html
    - screenshot
    - links

# ─── Obscura Headless Browser ─────────────────────────────────
obscura:
  enabled: true
  auto_update: true
  obey_robots: true
  timeout_ms: 30000
  max_concurrent: 10
  stealth: true

# ─── NLP Enrichment ──────────────────────────────────────────
nlp:
  enabled: true
  max_topics: 8
  max_entities: 20
  # Removed (YAGNI): min_entity_length, dedup_threshold

# ─── Output Format ────────────────────────────────────────────
output:
  default_format: toon
  dump_enabled: false
  dump_dir: "~/Documents/IGS"
  # Removed (YAGNI): toon_indent, max_items_per_response

# ─── Tool Groups ───────────────────────────────────────────────
# tool_groups: ["discovery", "news", "web"]
